name: Ktor plugin

on:
  push:
    branches: [ "main" ]
    paths:
      - '*gradle**'
      - 'ktor-plugin/**'
      - '.github/workflows/ktor-plugin.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '*gradle**'
      - 'ktor-plugin/**'
      - '.github/workflows/ktor-plugin.yml'
  workflow_call:
concurrency:
  # Limit concurrency to 1 for PRs. 'main' concurrency isn't limited.
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        include:
#          - target: iosSimulatorArm64Test
#            os: macos-latest
          - target: :ktor-plugin:jvmTest
            os: ubuntu-latest
#          - target: linuxX64Test
#            os: ubuntu-latest
#          - target: testAndroidHostTest
#            os: ubuntu-latest
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Validate Gradle Wrapper
      uses: gradle/actions/wrapper-validation@v4

    - uses: actions/cache@v4
      with:
        path: |
          ~/.konan
        key: ${{ runner.os }}-${{ hashFiles('**/.lock') }}

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Run unit tests
      uses: gradle/gradle-build-action@ce999babab2de1c4b649dc15f0ee67e6246c994f
      with:
        arguments: ${{ matrix.target }}

  api-check:
    name: Check API compatibility
    runs-on: ubuntu-latest
    if: github.repository == 'storyblok/kotlin-sdk' && github.ref == 'refs/heads/main'
    steps:
      - name: Check binary compatibility
        run: ./gradlew apiCheck || { exit_code=$?; printf "*** This commit changes the public API. If this change is intentional, run './gradlew apiDump' and commit the new API files. ***"; exit $exit_code; }

  api-dump:
    name: Update API dump
    runs-on: ubuntu-latest
    if: github.repository != 'storyblok/kotlin-sdk' || github.ref != 'refs/heads/main'
    steps:
    - name: Api File Update
      run: ./gradlew apiDump
    - run: git status
    - uses: stefanzweifel/git-auto-commit-action@v6

