name: Ktor plugin

on:
  push:
    branches: [ "main" ]
    paths:
      - '*gradle**'
      - 'ktor-client-plugin/**'
      - '.github/workflows/ktor-client-plugin.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '*gradle**'
      - 'ktor-client-plugin/**'
      - '.github/workflows/ktor-client-plugin.yml'
  workflow_call:
concurrency:
  # Limit concurrency to 1 for PRs. 'main' concurrency isn't limited.
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        include:
#          - target: iosSimulatorArm64Test
#            os: macos-latest
          - target: :ktor-client-plugin:jvmTest
            os: ubuntu-latest
#          - target: linuxX64Test
#            os: ubuntu-latest
#          - target: testAndroidHostTest
#            os: ubuntu-latest
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
    - uses: gradle/actions/setup-gradle@v5
    - uses: actions/cache@v4
      with:
        path: |
          ~/.konan
        key: ${{ runner.os }}-${{ hashFiles('**/.lock') }}
    - run: ./gradlew ${{ matrix.target }}

  api-check:
    runs-on: ubuntu-latest
    if: github.repository == 'storyblok/kotlin-sdk' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
    - uses: gradle/actions/setup-gradle@v5
    - run: ./gradlew checkLegacyAbi || { exit_code=$?; printf "*** This commit changes the public API. If intentional run './gradlew apiDump' and commit updated files. ***"; exit $exit_code; }

  api-dump:
    runs-on: ubuntu-latest
    if: github.repository != 'storyblok/kotlin-sdk' || github.ref != 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
    - uses: gradle/actions/setup-gradle@v5
    - run: ./gradlew updateLegacyAbi
    - uses: stefanzweifel/git-auto-commit-action@v6

