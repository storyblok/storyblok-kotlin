name: Content API Client

on:
  push:
    branches: [ "main" ]
    paths:
      - '*gradle**'
      - 'kotlin-js-store/yarn.lock'
      - 'kotlin-js-store/wasm/yarn.lock'
      - 'content-api-client/**'
      - '.github/workflows/content-api-client.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '*gradle**'
      - 'kotlin-js-store/yarn.lock'
      - 'kotlin-js-store/wasm/yarn.lock'
      - 'content-api-client/**'
      - '.github/workflows/content-api-client.yml'
  workflow_call:
concurrency:
  # Limit concurrency to 1 for PRs. 'main' concurrency isn't limited.
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        include:
          - target: :content-api-client:jvmTest
            os: ubuntu-latest
          - target: :content-api-client:linuxX64Test
            os: ubuntu-latest
          - target: :content-api-client:testAndroidHostTest
            os: ubuntu-latest
          - target: :content-api-client:jsTest
            os: ubuntu-latest
          - target: :content-api-client:wasmJsTest
            os: ubuntu-latest
#          - target: :content-api-client:mingwX64Test
#            os: windows-latest
          - target: :content-api-client:macosArm64Test
            os: macos-latest
          - target: :content-api-client:iosSimulatorArm64Test
            os: macos-latest
          - target: :content-api-client:tvosSimulatorArm64Test
            os: macos-latest
          - target: :content-api-client:watchosSimulatorArm64Test
            os: macos-latest
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
    - uses: gradle/actions/setup-gradle@v5
    - uses: actions/cache@v4
      with:
        path: |
          ~/.konan
        key: ${{ runner.os }}-${{ hashFiles('**/.lock') }}
    - run: ./gradlew ${{ matrix.target }}

  api-check:
    runs-on: ubuntu-latest
    if: github.repository == 'storyblok/storyblok-kotlin' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
    - uses: gradle/actions/setup-gradle@v5
    - run: ./gradlew :content-api-client:checkLegacyAbi || { exit_code=$?; printf "*** This commit changes the public API. If intentional run './gradlew :content-api-client:updateLegacyAbi' and commit updated files. ***"; exit $exit_code; }

  api-dump:
    runs-on: ubuntu-latest
    if: github.repository != 'storyblok/storyblok-kotlin' || github.ref != 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
    - uses: gradle/actions/setup-gradle@v5
    - run: ./gradlew :content-api-client:updateLegacyAbi
    - uses: stefanzweifel/git-auto-commit-action@v6

