name: Examples

on:
  push:
    branches: [ "main" ]
    paths:
      - '*gradle**'
      - 'ktor-client-plugin/src/**Main/**'
      - 'examples/**'
      - '.github/workflows/examples.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '*gradle**'
      - 'ktor-client-plugin/src/**Main/**'
      - 'examples/**'
      - '.github/workflows/examples.yml'
  workflow_call:
concurrency:
  # Limit concurrency to 1 for PRs. 'main' concurrency isn't limited.
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        include:
#          - target: iosSimulatorArm64Test
#            os: macos-latest
          - target: :examples:jvmTest
            os: ubuntu-latest
#          - target: linuxX64Test
#            os: ubuntu-latest
#          - target: testAndroidHostTest
#            os: ubuntu-latest
          - target: :examples:jsTest
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
    - uses: gradle/actions/setup-gradle@v5
    - uses: actions/cache@v4
      with:
        path: |
          ~/.konan
        key: ${{ runner.os }}-${{ hashFiles('**/.lock') }}
    - run: ./gradlew ${{ matrix.target }}
