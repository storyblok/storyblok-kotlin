name: Examples

on:
  push:
    branches: [ "main" ]
    paths:
      - '*gradle**'
      - 'ktor-client-storyblok/src/**Main/**'
      - 'examples/**'
      - '.github/workflows/examples.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '*gradle**'
      - 'ktor-client-storyblok/src/**Main/**'
      - 'examples/**'
      - '.github/workflows/examples.yml'
  workflow_call:
concurrency:
  # Limit concurrency to 1 for PRs. 'main' concurrency isn't limited.
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        include:
          - target: :examples:jvmTest
            os: ubuntu-latest
          - target: :examples:linuxX64Test
            os: ubuntu-latest
          - target: :examples:testAndroidHostTest
            os: ubuntu-latest
          - target: :examples:jsTest
            os: ubuntu-latest
          - target: :examples:wasmJsTest
            os: ubuntu-latest
#          - target: :examples:mingwX64Test
#            os: windows-latest
          - target: :examples:macosArm64Test
            os: macos-latest
          - target: :examples:iosSimulatorArm64Test
            simulator: iPhone 17
            os: macos-latest
          - target: :examples:tvosSimulatorArm64Test
            simulator: Apple TV
            os: macos-latest
          - target: :examples:watchosSimulatorArm64Test
            simulator: Apple Watch SE 3 (40mm)
            os: macos-latest
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
    - uses: gradle/actions/setup-gradle@v5
    - uses: actions/cache@v4
      with:
        path: ~/.konan
        key: ${{ runner.os }}-${{ hashFiles('**/.lock') }}
    - name: Install Xcode
      if: matrix.simulator
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    - name: Boot simulator
      if: matrix.simulator
      run: |
        xcrun simctl list
        xcrun simctl boot "${{ matrix.simulator }}"
    - name: Run tests
      run: ./gradlew ${{ matrix.target }}
