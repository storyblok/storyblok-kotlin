name: Ktor plugin

on:
  push:
    branches: [ "main" ]
    paths:
      - '*gradle**'
      - 'yarn.lock'
      - 'ktor-client-storyblok/**'
      - '.github/workflows/ktor-client-storyblok.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '*gradle**'
      - 'yarn.lock'
      - 'ktor-client-storyblok/**'
      - '.github/workflows/ktor-client-storyblok.yml'
  workflow_call:
concurrency:
  # Limit concurrency to 1 for PRs. 'main' concurrency isn't limited.
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        include:
          - target: :ktor-client-storyblok:jvmTest
            os: ubuntu-latest
          - target: :ktor-client-storyblok:linuxX64Test
            os: ubuntu-latest
          - target: :ktor-client-storyblok:testAndroidHostTest
            os: ubuntu-latest
          - target: :ktor-client-storyblok:jsTest
            os: ubuntu-latest
          - target: :ktor-client-storyblok:wasmJsTest
            os: ubuntu-latest
#          - target: :ktor-client-storyblok:mingwX64Test
#            os: windows-latest
          - target: :ktor-client-storyblok:macosArm64Test
            os: macos-latest
          - target: :ktor-client-storyblok:iosSimulatorArm64Test
            os: macos-latest
          - target: :ktor-client-storyblok:tvosSimulatorArm64Test
            os: macos-latest
          - target: :ktor-client-storyblok:watchosSimulatorArm64Test
            os: macos-latest
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
    - uses: gradle/actions/setup-gradle@v5
    - uses: actions/cache@v4
      with:
        path: |
          ~/.konan
        key: ${{ runner.os }}-${{ hashFiles('**/.lock') }}
    - run: ./gradlew ${{ matrix.target }}

  api-check:
    runs-on: ubuntu-latest
    if: github.repository == 'storyblok/storyblok-kotlin' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
    - uses: gradle/actions/setup-gradle@v5
    - run: ./gradlew :ktor-client-storyblok:checkLegacyAbi || { exit_code=$?; printf "*** This commit changes the public API. If intentional run './gradlew :ktor-client-storyblok:updateLegacyAbi' and commit updated files. ***"; exit $exit_code; }

  api-dump:
    runs-on: ubuntu-latest
    if: github.repository != 'storyblok/storyblok-kotlin' || github.ref != 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
    - uses: gradle/actions/setup-gradle@v5
    - run: ./gradlew :ktor-client-storyblok:updateLegacyAbi
    - uses: stefanzweifel/git-auto-commit-action@v6

