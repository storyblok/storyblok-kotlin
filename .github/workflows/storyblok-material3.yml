name: Material 3 Rich Text 

on:
  push:
    branches: [ "main" ]
    paths:
      - '*gradle**'
      - 'kotlin-js-store/yarn.lock'
      - 'kotlin-js-store/wasm/yarn.lock'
      - 'storyblok-material3/**'
      - '.github/workflows/storyblok-material3.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '*gradle**'
      - 'kotlin-js-store/yarn.lock'
      - 'kotlin-js-store/wasm/yarn.lock'
      - 'storyblok-material3/**'
      - '.github/workflows/storyblok-material3.yml'
  workflow_call:
concurrency:
  # Limit concurrency to 1 for PRs. 'main' concurrency isn't limited.
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        include:
          - target: :storyblok-material3:jvmTest
            os: ubuntu-latest
          - target: :storyblok-material3:testAndroidHostTest
            os: ubuntu-latest
          - target: :storyblok-material3:jsTest
            os: ubuntu-latest
          - target: :storyblok-material3:wasmJsTest
            os: ubuntu-latest
          - target: :storyblok-material3:macosArm64Test
            os: macos-latest
          - target: :storyblok-material3:iosSimulatorArm64Test
            os: macos-latest
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
    - uses: gradle/actions/setup-gradle@v5
    - uses: actions/cache@v4
      with:
        path: |
          ~/.konan
        key: ${{ runner.os }}-${{ hashFiles('**/.lock') }}
    - run: ./gradlew ${{ matrix.target }}

  api-check:
    runs-on: ubuntu-latest
    if: github.repository == 'storyblok/storyblok-kotlin' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
    - uses: gradle/actions/setup-gradle@v5
    - run: ./gradlew :storyblok-material3:checkLegacyAbi || { exit_code=$?; printf "*** This commit changes the public API. If intentional run './gradlew :storyblok-material3:updateLegacyAbi' and commit updated files. ***"; exit $exit_code; }

  api-dump:
    runs-on: ubuntu-latest
    if: github.repository != 'storyblok/storyblok-kotlin' || github.ref != 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
    - uses: gradle/actions/setup-gradle@v5
    - run: ./gradlew :storyblok-material3:updateLegacyAbi
    - uses: stefanzweifel/git-auto-commit-action@v6

